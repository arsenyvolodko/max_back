services:
  web:
    build: .
    image: max_back
    container_name: max_back
    restart: unless-stopped
    ports:
      # host:container — приложение доступно снаружи по 138.16.178.46:8000
      - "8000:8000"
    environment:
      DJANGO_ALLOWED_HOSTS: "138.16.178.46,localhost,127.0.0.1"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    volumes:
      - ./media:/app/media
